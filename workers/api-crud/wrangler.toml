# sos-api-crud Cloudflare Worker

name = "sos-api-crud"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put`):
#   DATABASE_URL      - postgres://USER:PASS@HOST:PORT/DB
#   API_KEY           - same key used by the app (X-Api-Key header)
#   JWT_SECRET        - secret key for signing JWT tokens (use: openssl rand -base64 48)
#   RESEND_API_KEY    - Resend API key for transactional emails (password reset)
# Vars (optional):
#   GOOGLE_CLIENT_IDS - comma-separated allowed Google OAuth client IDs
#   RESEND_FROM_EMAIL - sender address for emails (requires verified domain in Resend)
#
# When Easypanel PG gets SSL enabled, migrate to Hyperdrive:
#   wrangler hyperdrive create sos-postgres --connection-string="$DATABASE_URL"
#   Then add [[hyperdrive]] binding and update src/db.ts

[vars]
ENVIRONMENT = "production"
GOOGLE_CLIENT_IDS = ""
RESEND_FROM_EMAIL = "Radul <noreply@mail.radul.com.br>"
CF_ANALYTICS_SITE_TAG = "666e0c812f89489685d1a6a8aac08313"
# JWT_SECRET is a secret, not a var - set via: npx wrangler secret put JWT_SECRET
# RESEND_API_KEY is a secret - set via: npx wrangler secret put RESEND_API_KEY
# CLOUDFLARE_ACCOUNT_ID is a secret - set via: npx wrangler secret put CLOUDFLARE_ACCOUNT_ID

# KV namespace for public API rate limiting (persistent across isolates)
# Create via: npx wrangler kv namespace create "RATE_LIMIT_KV"
# Then update the id below with the returned namespace ID.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "6d08a188276e4627befb2c82b9ccf784"
# For local dev: npx wrangler kv namespace create "RATE_LIMIT_KV" --preview
# preview_id = "PLACEHOLDER_PREVIEW_ID"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false

# ─── Workers Containers (beta) — PHP fiscal microservice ───
# The FiscalContainer class (Durable Object) manages a Docker container
# running the sped-nfe PHP service. Cold start ~2-3s, scale-to-zero after 10m idle.
# Docker must be running locally during `npx wrangler deploy`.

[[containers]]
class_name = "FiscalContainer"
image = "../../microservices/fiscal-nfe"
max_instances = 1
instance_type = "lite"

[[durable_objects.bindings]]
name = "FISCAL_CONTAINER"
class_name = "FiscalContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FiscalContainer"]
persist = true
head_sampling_rate = 1